owner: NoMercy-Entertainment
repo: nomercy-status

sites:
  - name: Website
    url: https://nomercy.tv
    icon: https://nomercy.tv/favicon.ico

  - name: API
    url: https://api.nomercy.tv
    icon: https://nomercy.tv/favicon.ico

  - name: CDN
    url: https://cdn.nomercy.tv
    icon: https://nomercy.tv/favicon.ico

  - name: Authentication
    url: https://auth.nomercy.tv
    icon: https://nomercy.tv/favicon.ico

status-website:
  cname: status.nomercy.tv
  name: NoMercy Status
  theme: dark
  logoUrl: https://nomercy.tv/favicon.ico
  faviconUrl: https://nomercy.tv/favicon.ico
  navbar:
    - title: Homepage
      href: https://nomercy.tv
  css: |
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root {
      --bg-primary: #0f1117;
      --bg-panel: #1a1d26;
      --border-color: #2a2d3a;
      --accent: #6c63ff;
      --accent-light: #9f9bff;
      --text-primary: #e0e0e0;
      --text-secondary: #888;
      --text-heading: #fff;
      --green: #22c55e;
      --green-muted: #16a34a;
      --up-border-left-color: #22c55e;
      --up-color-color: #22c55e;
      --tag-up-background-color: #16a34a;
      --down-border-left-color: #ef4444;
      --tag-down-background-color: #ef4444;
      --degraded-border-left-color: #f59e0b;
      --tag-degraded-background-color: #f59e0b;
    }
    * { font-family: 'Inter', system-ui, -apple-system, sans-serif !important; }
    body { background: var(--bg-primary) !important; color: var(--text-primary) !important; }
    nav, .navbar, header { background: var(--bg-panel) !important; border-bottom: 1px solid var(--border-color) !important; }
    .container { max-width: 900px !important; }
    h1, h2, h3, h4 { color: var(--text-heading) !important; letter-spacing: -0.3px; }
    a { color: var(--text-primary) !important; }
    a:hover { color: var(--accent-light) !important; }
    nav a, .navbar a { color: var(--accent-light) !important; }
    article { background: var(--bg-panel) !important; border: 1px solid var(--border-color) !important; border-radius: 8px !important; box-shadow: none !important; }
    article.up { border-left: 3px solid var(--green) !important; }
    article.down { border-left: 3px solid #ef4444 !important; }
    article.degraded { border-left: 3px solid #f59e0b !important; }
    article h4 a { color: #fff !important; }
    article h4 a:hover { color: var(--accent-light) !important; }
    .tag.up, .tag.closed { background: var(--green-muted) !important; color: #fff !important; }
    .tag.down, .tag.open { background: #ef4444 !important; color: #fff !important; }
    .tag.degraded { background: #f59e0b !important; color: #fff !important; }
    .card, .shadow, [class*="shadow"] { background: var(--bg-panel) !important; border: 1px solid var(--border-color) !important; border-radius: 8px !important; box-shadow: none !important; }
    .badge-success, .badge-up { background: var(--green-muted) !important; }
    .badge-danger, .badge-down { background: #ef4444 !important; }
    footer { background: var(--bg-panel) !important; border-top: 1px solid var(--border-color) !important; }
    footer a { color: var(--accent-light) !important; }
    .text-muted { color: var(--text-secondary) !important; }
    .data { background: rgba(255, 255, 255, 0.06) !important; color: #ccc !important; }
    .status-up { color: var(--green) !important; }
    .status-down { color: #ef4444 !important; }
    .btn-primary, .btn-outline-primary { background: var(--accent) !important; border-color: var(--accent) !important; color: #fff !important; border-radius: 6px !important; }
    .btn-primary:hover, .btn-outline-primary:hover { background: var(--accent-light) !important; }

i18n:
  activeIncidents: Ongoing Incidents
  allSystemsOperational: All systems operational
  incidentReport: Incident Report

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  updates: "*/5 * * * *"

commitMessages:
  statusChange: "🔔 $SITE_NAME is $STATUS ($RESPONSE_CODE in $RESPONSE_TIME ms)"
  graphsUpdate: "📊 Update graphs"
  summaryUpdate: "📊 Update summary"
